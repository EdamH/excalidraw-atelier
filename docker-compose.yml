services:
  mongo:
    image: mongo:7
    container_name: excalidraw-mongo
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: excalidraw-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/excalidraw
      JWT_SECRET: devsecret
      FRONTEND_ORIGIN: http://localhost:5173
      PORT: "4000"
      ADMIN_EMAILS: alice@team.com
      ENABLE_COLLAB: "true"
    ports:
      - "4100:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4100
        VITE_ENABLE_COLLAB: "true"
    container_name: excalidraw-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mongo-data:
